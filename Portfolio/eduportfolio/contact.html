<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduPortfolio | Contact</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">EduPortfolio</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
        <a href="login.html" class="button secondary">Login</a>
      </nav>
      <button class="nav-toggle" aria-label="Toggle navigation">Menu</button>
    </div>
  </header>

  <main class="container">
    <section class="page-heading">
      <h1>Contact Me</h1>
      <p>Send a message with form validation and instant feedback.</p>
    </section>

    <section class="contact-card">
      <form id="contact-form" novalidate>
        <div class="form-group">
          <label for="contact-name">Name</label>
          <input type="text" id="contact-name" name="name" required />
          <small class="error-message"></small>
        </div>
        <div class="form-group">
          <label for="contact-email">Email</label>
          <input type="email" id="contact-email" name="email" required />
          <small class="error-message"></small>
        </div>
        <div class="form-group">
          <label for="contact-message">Message</label>
          <textarea id="contact-message" name="message" rows="5" required></textarea>
          <small class="error-message"></small>
        </div>
        <button type="submit" class="button">Send Message</button>
        <p id="contact-feedback" class="form-feedback"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 EduPortfolio. Built for educational deployment.</p>
    </div>
  </footer>

  <script src="js/script.js" defer></script>
</body>
</html>
